<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Email</title>
  </head>

  <body style="margin:0; padding:0; background-color:#f4f6f8;">
    <table width="100%" cellpadding="0" cellspacing="0" bgcolor="#f4f6f8">
      <tr>
        <td align="center">
          <table
            width="600"
            cellpadding="0"
            cellspacing="0"
            bgcolor="#ffffff"
            style="margin:30px auto; border-radius:6px;"
          >
            <!-- Header -->
            <tr>
              <td
                align="center"
                style="padding:20px; border-bottom:1px solid #eaeaea;"
              >
                <h2 style="margin:0; font-family:Arial, sans-serif;">
                  {{ title }}
                </h2>
              </td>
            </tr>

            <!-- Content -->
            <tr>
              <td style="padding:20px; font-family:Arial, sans-serif; color:#333;">
                <p>Hello {{ name }},</p>

                <p>{{ message }}</p>
             
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td
                align="center"
                style="
                  padding:16px;
                  font-family:Arial, sans-serif;
                  font-size:12px;
                  color:#888;
                "
              >
                © 2026 QuickBite. All rights reserved.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
